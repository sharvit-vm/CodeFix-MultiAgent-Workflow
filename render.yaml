services:
  - type: web
    name: codefix-multiagent-workflow
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: "1536"
      - key: MAX_CHUNK_TOKENS
        value: "800"
      - key: MAX_HIERARCHY_LEVELS
        value: "8"
      - key: CACHE_DIR
        value: cache
      - key: CLONE_ROOT
        value: clone
      - key: AUTO_INGEST_ON_WEBHOOK
        value: "true"
      - key: AUTO_VECTOR_INGEST_ON_WEBHOOK
        value: "false"
